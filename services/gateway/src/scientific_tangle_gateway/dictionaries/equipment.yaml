equipment:
  - name: ванна электроэкстракции
    aliases: ["electrowinning cell", "ew cell", "электролизная ванна"]
    entity_type: equipment
  - name: диафрагменная ячейка
    aliases: ["diaphragm cell", "diaphragmatic cell"]
    entity_type: equipment
  - name: печь взвешенной плавки
    aliases: ["пвп", "flash furnace", "flash smelter"]
    entity_type: equipment
  - name: мембранный модуль
    aliases: ["membrane module", "membrane element"]
    entity_type: equipment
  - name: обратный осмос установка
    aliases: ["ro unit", "ro plant", "ro system"]
    entity_type: equipment
  - name: насос
    aliases: ["pump"]
    entity_type: equipment
  - name: теплообменник
    aliases: ["heat exchanger"]
    entity_type: equipment
  - name: система очистки газов
    aliases: ["gas cleaning system", "gas treatment plant"]
    entity_type: equipment
  - name: скважина закачки
    aliases: ["injection well", "reinjection well"]
