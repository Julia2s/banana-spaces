properties:
  - name: концентрация
    aliases: ["concentration"]
    dimension: concentration
    units: ["мг/л", "мг/дм3", "мг/дм³", "g/l", "ppm"]
  - name: температура
    aliases: ["temperature"]
    dimension: temperature
    units: ["°c", "c", "k"]
  - name: скорость потока
    aliases: ["flow rate", "flow velocity"]
    dimension: flow_rate
    units: ["м/с", "m/s", "л/мин", "l/min", "м3/ч", "m3/h"]
  - name: производительность
    aliases: ["capacity", "throughput"]
    dimension: capacity
    units: ["т/сут", "t/day", "т/год", "t/year", "кг/ч"]
  - name: сухой остаток
    aliases: ["dry residue", "tds", "total dissolved solids"]
    dimension: concentration
    units: ["мг/дм3", "мг/дм³", "мг/л"]
  - name: выход металла
    aliases: ["metal recovery", "metal yield"]
    dimension: percent
    units: ["%", "процентов"]
  - name: капитальные затраты
    aliases: ["capex", "capital cost"]
    dimension: currency
    units: ["руб", "usd", "eur", "млн руб"]
  - name: операционные затраты
    aliases: ["opex", "operating cost"]
    dimension: currency
    units: ["руб/т", "usd/t", "руб/м3"]

