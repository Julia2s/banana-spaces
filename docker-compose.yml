services:
  gateway:
    build:
      context: ./services/gateway
    environment:
      GATEWAY_ENVIRONMENT: ${GATEWAY_ENVIRONMENT:-local}
      GATEWAY_RAW_UPLOAD_DIR: ${GATEWAY_RAW_UPLOAD_DIR:-/app/data/raw_uploads}
      GATEWAY_NORMALIZED_DIR: ${GATEWAY_NORMALIZED_DIR:-/app/data/normalized}
      GATEWAY_SOURCE_CORPUS_DIR: ${GATEWAY_SOURCE_CORPUS_DIR:-/app/demo/seed_data}
      GATEWAY_DB_DSN: ${GATEWAY_DB_DSN:-postgresql://scientific_tangle:scientific_tangle@postgres:5432/scientific_tangle}
      GATEWAY_NEO4J_URI: ${GATEWAY_NEO4J_URI:-bolt://neo4j:7687}
      GATEWAY_NEO4J_USER: ${GATEWAY_NEO4J_USER:-neo4j}
      GATEWAY_NEO4J_PASSWORD: ${GATEWAY_NEO4J_PASSWORD:-scientific_tangle}
      GATEWAY_QDRANT_URL: ${GATEWAY_QDRANT_URL:-http://qdrant:6333}
      GATEWAY_YANDEX_FOLDER_ID: ${GATEWAY_YANDEX_FOLDER_ID:-}
      GATEWAY_YANDEX_IAM_TOKEN: ${GATEWAY_YANDEX_IAM_TOKEN:-}
      GATEWAY_EMBEDDINGS_BACKEND: ${GATEWAY_EMBEDDINGS_BACKEND:-sentence-transformers}
      GATEWAY_EMBEDDINGS_MODEL_NAME: ${GATEWAY_EMBEDDINGS_MODEL_NAME:-sentence-transformers/LaBSE}
      GATEWAY_AUDIT_ENABLED: ${GATEWAY_AUDIT_ENABLED:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./demo:/app/demo
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scientific_tangle}
      POSTGRES_USER: ${POSTGRES_USER:-scientific_tangle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scientific_tangle}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scientific_tangle} -d ${POSTGRES_DB:-scientific_tangle}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/scientific_tangle}
      HEALTHCHECK_NEO4J_USER: ${HEALTHCHECK_NEO4J_USER:-neo4j}
      HEALTHCHECK_NEO4J_PASSWORD: ${HEALTHCHECK_NEO4J_PASSWORD:-scientific_tangle}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${HEALTHCHECK_NEO4J_USER:-neo4j} -p $${HEALTHCHECK_NEO4J_PASSWORD:-scientific_tangle} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-scientific_tangle}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-scientific_tangle_minio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  minio_data:
